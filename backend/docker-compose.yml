version: '3.8'

services:
  # Backend API Service
  hospital-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - JAVA_OPTS=-Xmx512m -Xms256m
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge
